version: '3.8'

services:
  tenderzon-media:
    build: .
    container_name: tenderzon_media
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tashkent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/pipeline.db')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s